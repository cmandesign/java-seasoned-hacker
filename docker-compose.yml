version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: owasp-demo-postgres
    environment:
      POSTGRES_DB: owaspdb
      POSTGRES_USER: owasp
      POSTGRES_PASSWORD: owasp123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U owasp -d owaspdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: owasp-demo-app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/owaspdb
      SPRING_DATASOURCE_USERNAME: owasp
      SPRING_DATASOURCE_PASSWORD: owasp123
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
