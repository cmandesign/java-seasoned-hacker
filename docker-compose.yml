version: "3.9"

networks:
  owasp-net:
    driver: bridge

services:
  redis:
    image: redis:7-alpine
    container_name: owasp-demo-redis
    networks:
      - owasp-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: owasp-demo-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-owaspdb}
      POSTGRES_USER: ${DB_USERNAME:-owasp}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - owasp-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U owasp -d owaspdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: owasp-demo-app
    ports:
      - "8085:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-owaspdb}
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME:-owasp}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - owasp-net
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: owasp-demo-frontend
    ports:
      - "3000:80"
    depends_on:
      - app
    networks:
      - owasp-net
    restart: unless-stopped

volumes:
  pgdata:
