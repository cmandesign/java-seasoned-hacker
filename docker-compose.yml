version: "3.9"

networks:
  owasp-net:
    driver: bridge

services:
  redis:
    image: redis:7-alpine
    container_name: owasp-demo-redis
    networks:
      - owasp-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: owasp-demo-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-owaspdb}
      POSTGRES_USER: ${DB_USERNAME:-owasp}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - owasp-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U owasp -d owaspdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: owasp-demo-app
    ports:
      - "8085:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-owaspdb}
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME:-owasp}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - owasp-net
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: owasp-demo-frontend
    ports:
      - "3000:80"
    depends_on:
      - app
    networks:
      - owasp-net
    restart: unless-stopped

  # --- ELK Stack for activity log monitoring ---

  elasticsearch:
    image: elasticsearch:8.12.0
    container_name: owasp-demo-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
    ports:
      - "9200:9200"
    networks:
      - owasp-net
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 10s
      timeout: 5s
      retries: 10

  kibana:
    image: kibana:8.12.0
    container_name: owasp-demo-kibana
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - XPACK_ENCRYPTEDSAVEDOBJECTS_ENCRYPTIONKEY=a7f3c9b2e1d4f6a8c0b2d4f6a8c0b2d4
      - XPACK_REPORTING_ENCRYPTIONKEY=b8d4f6a2c0e4f8b2d4f6a8c0b2d4f6a8
      - XPACK_SECURITY_ENCRYPTIONKEY=c0b2d4f6a8e0b2d4f6a8c0b2d4f6a8c0
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - owasp-net

  filebeat:
    image: elastic/filebeat:8.12.0
    container_name: owasp-demo-filebeat
    user: root
    volumes:
      - ./filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - ./myapp:/var/log/myapp:ro
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - owasp-net

  elastalert:
    image: jertel/elastalert2:latest
    container_name: owasp-demo-elastalert
    volumes:
      - ./elastalert/config.yaml:/opt/elastalert/config.yaml:ro
      - ./elastalert/rules:/opt/elastalert/rules:ro
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - owasp-net

volumes:
  pgdata:
