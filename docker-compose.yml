version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: owasp-demo-postgres
    environment:
      POSTGRES_DB: owaspdb
      POSTGRES_USER: owasp
      POSTGRES_PASSWORD: owasp123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
